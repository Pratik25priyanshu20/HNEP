name: HNEP CI

on:
  push:
    paths:
      - "hnep/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/hnep-ci.yml"
    branches: [main, hnep]
  pull_request:
    paths:
      - "hnep/**"
      - "tests/**"
      - "pyproject.toml"

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Tests ──────────────────────────────────────────────
  tests:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install HNEP + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ --tb=short --color=yes -q

  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: ruff check
        run: ruff check hnep tests

      - name: ruff format check
        run: ruff format --check hnep tests || true   # informational for v0.1

  # ── Build ──────────────────────────────────────────────
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Inspect distributions with twine
        run: twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hnep-dist
          path: dist/

  # ── Docs ──────────────────────────────────────────────
  docs:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs deps
        run: |
          pip install -e .
          pip install sphinx furo myst-parser

      - name: Build docs
        run: |
          cd docs_hnep
          python -m sphinx -W --keep-going -b html . _build/html

      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: hnep-docs
          path: docs_hnep/_build/html/
