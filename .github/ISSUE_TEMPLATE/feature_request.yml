name: 💡 Feature request
description: Suggest a new probe, adapter, visualisation, or anything else.
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What problem does this solve?
      description: Describe the use case in concrete terms.
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the feature work? Example API call?
      render: python
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is preferred.
