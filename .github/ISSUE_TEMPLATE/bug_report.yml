name: 🐛 Bug report
description: Something is broken in HNEP.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations: { required: true }
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: A short code snippet that triggers the bug.
      render: python
    validations: { required: true }
  - type: input
    id: hnep-version
    attributes:
      label: HNEP version
      description: Output of `python -c "import hnep; print(hnep.__version__)"`.
    validations: { required: true }
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
    validations: { required: true }
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04
  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: Stack traces, screenshots, links to related issues.
